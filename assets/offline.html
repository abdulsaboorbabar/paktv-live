<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAKTV - Offline</title>
    <style>
        body {
            background-color: #0d0e12;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
        }
        svg {
            width: 80px;
            height: 80px;
            fill: none;
            stroke: #14b8a6;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 0.5rem 0;
            color: #ffffff;
        }
        p {
            color: #9ca3af;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            background-color: #0f766e;
            color: #ffffff;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s;
            cursor: pointer;
            border: none;
        }
        .btn:hover {
            background-color: #0d9488;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 24 24">
            <line x1="1" y1="1" x2="23" y2="23"></line>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
            <path d="M5 12.5a10.94 10.94 0 0 1 5.83-2.84"></path>
            <path d="M7.34 14.7a8 8 0 0 1 3.51-1.61"></path>
            <path d="M13.14 13.14a8 8 0 0 1 3.52 1.56"></path>
            <path d="M9.69 17.05A4 4 0 0 1 12 16.5a4 4 0 0 1 2.31.55"></path>
            <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
        <h1>You are Offline</h1>
        <p>PAKTV Live requires an active internet connection to stream live television channels. Please check your connection and try again.</p>
        <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    </div>
</body>
</html>
